<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MC’s Menu</title>
<style>
  :root { --gap: 12px; --accent: #0a7; }
  body { font-family: system-ui, sans-serif; margin: 0; padding: 16px; line-height: 1.35; }
  h1, h2 { margin: 0 0 10px; }
  .section { margin: 18px 0; }
  .menu-item, .cart-row { display: grid; grid-template-columns: 1fr auto; gap: var(--gap); align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
  .price { font-weight: 600; }
  .controls { display: inline-flex; align-items: center; gap: 6px; }
  button { padding: 8px 10px; border: 1px solid #ccc; background: #fff; border-radius: 8px; font-size: 16px; cursor: pointer; }
  button:active { transform: translateY(1px); }
  .pill { border-color: var(--accent); color: var(--accent); }
  .qty { min-width: 2ch; text-align: center; display: inline-block; }
  .muted { color: #666; }
  .cart-empty { padding: 8px 0; color: #666; }
  .totals { display: flex; justify-content: space-between; margin-top: 8px; font-weight: 700; }
  .row-meta { font-size: 14px; color: #444; }
  .danger { border-color: #c33; color: #c33; }
  @media (min-width: 520px) {
    .menu-item, .cart-row { grid-template-columns: 1fr auto auto; }
  }
</style>
</head>
<body>

<h1>MC’s Menu</h1>

<div class="section" id="menu-section">
  <h2>Menu</h2>
  <div id="menu"></div>
</div>

<div class="section" id="cart-section">
  <h2>Your Cart</h2>
  <div id="cart"></div>
  <div class="totals">
    <span>Total</span>
    <span id="total">£0.00</span>
  </div>
  <div style="margin-top:12px; display:flex; gap:10px;">
    <button id="clear">Clear cart</button>
    <button id="checkout" class="pill">Checkout</button>
  </div>
</div>

<script>
const ITEMS = [
  { id: 1, name: "Love",    price: 520.00 },
  { id: 2, name: "Dream",     price:  74.00 },
  { id: 3, name: "Freedom",    price:  88.00 },
  { id: 4, name: "Friendship",     price:  79.00 },
  { id: 5, name: "Dog", price:  1.00 },
];

const GBP = new Intl.NumberFormat("en-GB", { style: "currency", currency: "GBP" });
let cart = {}; // id -> qty

function q(id){ return cart[id] || 0; }
function setQ(id, qty){
  if (qty <= 0) { delete cart[id]; }
  else { cart[id] = qty; }
  render();
}
function add(id){ setQ(id, q(id)+1); }
function sub(id){ setQ(id, q(id)-1); }
function removeItem(id){ delete cart[id]; render(); }

function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";
  ITEMS.forEach(item => {
    const div = document.createElement("div");
    div.className = "menu-item";
    div.innerHTML = `
      <div>
        <div>${item.name}</div>
        <div class="muted">${GBP.format(item.price)}</div>
      </div>
      <div class="controls">
        <button aria-label="decrease ${item.name}" onclick="sub(${item.id})">➖</button>
        <span class="qty">${q(item.id)}</span>
        <button aria-label="add ${item.name}" class="pill" onclick="add(${item.id})">➕</button>
      </div>
    `;
    menu.appendChild(div);
  });
}

function renderCart(){
  const cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";
  const ids = ITEMS.map(i => i.id).filter(id => q(id) > 0);

  if (ids.length === 0) {
    const empty = document.createElement("div");
    empty.className = "cart-empty";
    empty.textContent = "(empty)";
    cartDiv.appendChild(empty);
    document.getElementById("total").textContent = GBP.format(0);
    return;
  }

  let total = 0;
  ids.forEach(id => {
    const item = ITEMS.find(i => i.id === id);
    const qty  = q(id);
    const line = qty * item.price;
    total += line;

    const row = document.createElement("div");
    row.className = "cart-row";
    row.innerHTML = `
      <div>
        <div>${item.name}</div>
        <div class="row-meta">${GBP.format(item.price)} each · Line: ${GBP.format(line)}</div>
      </div>
      <div class="controls">
        <button aria-label="decrease ${item.name}" onclick="sub(${id})">➖</button>
        <span class="qty">${qty}</span>
        <button aria-label="increase ${item.name}" onclick="add(${id})">➕</button>
      </div>
      <div>
        <button aria-label="remove ${item.name}" class="danger" onclick="removeItem(${id})">❌ Remove</button>
      </div>
    `;
    cartDiv.appendChild(row);
  });

  document.getElementById("total").textContent = GBP.format(total);
}

function checkout(){
  const ids = ITEMS.map(i => i.id).filter(id => q(id) > 0);
  if (ids.length === 0) {
    alert("Your cart is empty.");
    return;
  }
  let receipt = "Receipt\n-----------------\n";
  let total = 0;
  ids.forEach(id => {
    const item = ITEMS.find(i => i.id === id);
    const qty  = q(id);
    const line = qty * item.price;
    total += line;
    receipt += `${item.name} x${qty} @ ${GBP.format(item.price)} = ${GBP.format(line)}\n`;
  });
  receipt += "-----------------\nTotal: " + GBP.format(total);
  alert(receipt);
  cart = {};
  render();
}

function clearCart(){
  cart = {};
  render();
}

function render(){
  renderMenu();
  renderCart();
}

document.getElementById("checkout").addEventListener("click", checkout);
document.getElementById("clear").addEventListener("click", clearCart);

// Initial render
render();
</script>
</body>
</html>
